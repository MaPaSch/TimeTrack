<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Icon Generator - TimeTrack PWA</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        h1 {
            color: #2d5a45;
        }
        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .icon-item {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        .icon-item canvas {
            display: block;
            margin: 0 auto 10px;
            border-radius: 20%;
        }
        .icon-item a {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 16px;
            background: #2d5a45;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 14px;
        }
        .icon-item a:hover {
            background: #234836;
        }
        .instructions {
            background: #e8f0ec;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <h1>🕐 TimeTrack Icon Generator</h1>
    
    <div class="instructions">
        <p><strong>Anleitung:</strong></p>
        <ol>
            <li>Öffne diese Datei in einem Browser</li>
            <li>Klicke auf "Download" bei jedem Icon</li>
            <li>Speichere die Dateien im <code>icons/</code> Ordner mit dem angegebenen Namen</li>
        </ol>
    </div>
    
    <div class="icon-grid" id="iconGrid"></div>
    
    <script>
        const sizes = [72, 96, 128, 144, 152, 192, 384, 512];
        const primaryColor = '#2d5a45';
        const whiteColor = '#ffffff';
        
        function drawIcon(ctx, size) {
            const scale = size / 512;
            
            // Background with rounded corners
            ctx.fillStyle = primaryColor;
            roundRect(ctx, 0, 0, size, size, size * 0.1875);
            ctx.fill();
            
            // Clock face
            ctx.fillStyle = whiteColor;
            ctx.beginPath();
            ctx.arc(size / 2, size / 2, size * 0.3125, 0, Math.PI * 2);
            ctx.fill();
            
            // Hour markers
            ctx.strokeStyle = primaryColor;
            ctx.lineWidth = size * 0.03;
            ctx.lineCap = 'round';
            
            const markerInner = size * 0.27;
            const markerOuter = size * 0.23;
            const center = size / 2;
            
            for (let i = 0; i < 12; i += 3) {
                const angle = (i * 30 - 90) * Math.PI / 180;
                ctx.beginPath();
                ctx.moveTo(center + Math.cos(angle) * markerOuter, center + Math.sin(angle) * markerOuter);
                ctx.lineTo(center + Math.cos(angle) * markerInner, center + Math.sin(angle) * markerInner);
                ctx.stroke();
            }
            
            // Hour hand (pointing to 12)
            ctx.strokeStyle = primaryColor;
            ctx.lineWidth = size * 0.047;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(center, center);
            ctx.lineTo(center, center - size * 0.156);
            ctx.stroke();
            
            // Minute hand (pointing to 2)
            ctx.lineWidth = size * 0.035;
            const minuteAngle = (60 - 90) * Math.PI / 180;
            ctx.beginPath();
            ctx.moveTo(center, center);
            ctx.lineTo(center + Math.cos(minuteAngle) * size * 0.2, center + Math.sin(minuteAngle) * size * 0.2);
            ctx.stroke();
            
            // Center dot
            ctx.fillStyle = primaryColor;
            ctx.beginPath();
            ctx.arc(center, center, size * 0.031, 0, Math.PI * 2);
            ctx.fill();
        }
        
        function roundRect(ctx, x, y, width, height, radius) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.arcTo(x + width, y, x + width, y + height, radius);
            ctx.arcTo(x + width, y + height, x, y + height, radius);
            ctx.arcTo(x, y + height, x, y, radius);
            ctx.arcTo(x, y, x + width, y, radius);
            ctx.closePath();
        }
        
        const grid = document.getElementById('iconGrid');
        
        sizes.forEach(size => {
            const item = document.createElement('div');
            item.className = 'icon-item';
            
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            canvas.style.width = Math.min(size, 128) + 'px';
            canvas.style.height = Math.min(size, 128) + 'px';
            
            const ctx = canvas.getContext('2d');
            drawIcon(ctx, size);
            
            const link = document.createElement('a');
            link.href = canvas.toDataURL('image/png');
            link.download = `icon-${size}.png`;
            link.textContent = `Download ${size}x${size}`;
            
            const label = document.createElement('p');
            label.textContent = `icon-${size}.png`;
            label.style.fontWeight = 'bold';
            label.style.marginBottom = '5px';
            
            item.appendChild(label);
            item.appendChild(canvas);
            item.appendChild(link);
            grid.appendChild(item);
        });
    </script>
</body>
</html>
